  <title>AXCELIS 통합 관리</title>
</head>
<body>
<style id="unified-override">
/* ════ 통합 강제 오버라이드 ════ */
#sect-purchase .pg          { display:none   !important; }
#sect-purchase .pg.on       { display:block  !important; }
#sect-po       .page        { display:none   !important; }
#sect-po       .page.active { display:block  !important; }
.sect-wrap      { display:none  !important; }
.sect-wrap.on   { display:block !important; }
div#pt-inner-tabs{display:none!important;height:0!important;overflow:hidden!important;padding:0!important;margin:0!important;border:none!important;position:static!important}
div#pt-inner-tabs .pt-itab {
  display:flex !important; flex-shrink:0 !important; width:auto !important;
  padding:10px 18px; font-size:13px; color:var(--text3); cursor:pointer;
  border-bottom:2px solid transparent; white-space:nowrap; user-select:none;
}
div#pt-inner-tabs .pt-itab:hover { color:var(--text); }
div#pt-inner-tabs .pt-itab.on {
  color:var(--tel,#2dd4bf) !important;
  border-bottom-color:var(--tel,#2dd4bf) !important;
  font-weight:600;
}
div#po-inner-tabs{display:none!important;height:0!important;overflow:hidden!important;padding:0!important;margin:0!important;border:none!important;position:static!important}
div#po-inner-tabs .po-itab {
  display:flex !important; flex-shrink:0 !important; width:auto !important;
  padding:10px 18px; font-size:13px; color:var(--text3); cursor:pointer;
  border-bottom:2px solid transparent; white-space:nowrap; user-select:none;
}
div#po-inner-tabs .po-itab:hover { color:var(--text); }
div#po-inner-tabs .po-itab.active {
  color:var(--amber,#ffb547) !important;
  border-bottom-color:var(--amber,#ffb547) !important;
  font-weight:600;
}
#sect-purchase .stabs { display:none !important; }

/* ════ 로그인 오버레이 ════ */
.login-overlay{position:fixed;inset:0;background:#0a0d14;display:flex;align-items:center;justify-content:center;z-index:9999}
.login-box{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;padding:40px 36px;width:380px;max-width:calc(100vw - 40px)}
.login-logo{display:flex;align-items:center;gap:12px;margin-bottom:32px}
.login-logo-mark{width:40px;height:40px;background:var(--accent);border-radius:10px;display:grid;place-items:center;font-weight:800;font-size:14px;color:#fff;font-family:var(--mono);flex-shrink:0}
.login-title{font-size:18px;font-weight:700;color:var(--text)}
.login-sub{font-size:12px;color:var(--text3);margin-top:2px}
.login-field{margin-bottom:14px}
.login-field label{display:block;font-size:12px;color:var(--text2);margin-bottom:6px;font-weight:600}
.login-field input{width:100%;padding:10px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;font-family:var(--font);outline:none;transition:border .15s}
.login-field input:focus{border-color:var(--accent)}
.login-btn{width:100%;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;margin-top:6px;font-family:var(--font);transition:opacity .15s}
.login-btn:hover{opacity:.9}
.login-btn:disabled{opacity:.5;cursor:not-allowed}
.login-err{color:var(--red);font-size:12px;text-align:center;margin-top:10px;min-height:18px}
.login-loading{font-size:12px;color:var(--text3);text-align:center;margin-top:8px}
/* ── 사용자 배지 ── */
.user-badge{display:flex;align-items:center;gap:8px;padding:5px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;cursor:pointer;position:relative}
.user-badge:hover{border-color:var(--accent)}
.user-name{font-size:12px;font-weight:600;color:var(--text2)}
.user-menu{position:absolute;top:calc(100% + 6px);right:0;background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:8px;min-width:200px;z-index:300;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.user-menu-item{padding:8px 12px;border-radius:7px;font-size:12px;color:var(--text2);cursor:pointer;display:flex;align-items:center;gap:8px}
.user-menu-item:hover{background:var(--bg3);color:var(--text)}
.user-menu-divider{border:none;border-top:1px solid var(--border);margin:4px 0}
.user-menu-info{padding:8px 12px;font-size:11px;color:var(--text3)}
/* ── 동기화 상태 ── */
.sync-indicator{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text3)}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0}
.sync-dot.syncing{background:var(--amber);animation:pulse .8s infinite}
.sync-dot.error{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}


/* ── sect-agg 내부 페이지 표시 ── */
#sect-agg .pg           { display:none   !important; }
#sect-agg .pg.on        { display:block  !important; }
</style>

<script>
// 섹션 HTML 동적 로드
async function loadSections() {
  var sections = ['pdbox','srch','po','purchase','quote'];
  var mc = document.getElementById('main-content');
  if(!mc) { console.error('main-content not found'); return; }
  for (var i=0; i<sections.length; i++) {
    var name = sections[i];
    try {
      var res = await fetch('src/' + name + '/' + name + '.html');
      var html = await res.text();
      mc.insertAdjacentHTML('beforeend', html);
    } catch(e) {
      console.error('Failed to load ' + name, e);
    }
  }
  console.log('[sections] all loaded');
}
loadSections();
</script>
