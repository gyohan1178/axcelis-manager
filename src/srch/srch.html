<div class="sect-wrap" id="sect-srch" style="display:none">

  <!-- 자재조회 내부 탭 -->
  <div id="srch-inner-tabs" style="display:flex;gap:0;border-bottom:1px solid var(--border);background:var(--bg2);padding:0 20px;position:sticky;top:0;z-index:140">
    <div class="pt-itab on" data-tab="item" onclick="srchTab('item')" style="padding:10px 20px">🔍 품번 조회</div>
    <div class="pt-itab" data-tab="req" onclick="srchTab('req')" style="padding:10px 20px">📤 자재불출요청</div>
    <div class="pt-itab" data-tab="bom" onclick="srchTab('bom')" style="padding:10px 20px">🌿 BOM 조회</div>
    <div class="pt-itab" data-tab="where" onclick="srchTab('where')" style="padding:10px 20px">🔄 역전개</div>
  </div>



  <!-- ① 품번 조회 -->
  <div id="srch-pg-item" style="display:block;padding:16px 20px">
    <div class="srch-hero">
      <div class="srch-bar">
        <input id="sq" placeholder="품번 또는 품명으로 검색 (예: 510000106, CONN RECT...)"
          oninput="srchLive()" onkeydown="if(event.key==='Enter')doSrch()">
        <button class="bt-btn btn" onclick="doSrch()" style="background:var(--tel);color:#051515">검색</button>
        <button class="bk-btn btn" onclick="clearSrch()">초기화</button>
      </div>
      <div class="srch-hint" id="sq-hint">품번 전체 또는 일부 · 품명 · 제조사 · 보관좌표 검색 가능</div>
    </div>
    <div id="srch-results"></div>
    <div id="bom-results-item"></div>
  </div>

  <!-- ② 자재불출요청 -->
  <div id="srch-pg-req" style="display:none;padding:16px 20px">
    <div class="req-panel" id="req-panel" style="display:block">
      <span class="req-badge">📤 불출 요청</span>
      <div class="req-grid" style="margin-top:6px">
        <div><label class="fgl">요청일 *</label><input id="req-dt" type="date"></div>
        <div><label class="fgl">출고처 *</label><input id="req-dest" list="dl2" placeholder="코링스, 하네스..."><datalist id="dl2"></datalist></div>
        <div><label class="fgl">인수자</label><input id="req-rec" placeholder="성명"></div>
        <div class="fgf" style="grid-column:1/-1"><label class="fgl">출고목적</label>
          <select id="req-pur"><option>자재불출</option><option>납품</option><option>파손</option><option>불량</option><option>기타</option></select>
        </div>
      </div>
      <div class="req-items">
        <table>
          <thead><tr><th>품번</th><th>품명</th><th>요청수량</th><th>단위</th><th>비고</th><th></th></tr></thead>
          <tbody id="req-tbody"></tbody>
        </table>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-top:10px">
        <span style="font-size:11px;color:var(--text3)">품번 조회 탭에서 <b style="color:var(--tel)">+ 불출요청</b> 버튼을 눌러 품목을 추가하세요</span>
        <div style="display:flex;gap:8px">
          <button class="btn bk-btn sm" onclick="clearReq()">요청 초기화</button>
          <button class="btn bt-btn" onclick="submitReq()">✅ 불출 요청 제출</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ③ BOM 조회 -->
  <div id="srch-pg-bom" style="display:none;padding:16px 20px">
    <div style="display:flex;gap:8px;margin-bottom:14px">
      <input id="bom-lookup-pn" placeholder="상위품번 입력 (예: 110153030)"
        style="flex:1;padding:10px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;font-family:var(--mono)"
        onkeydown="if(event.key==='Enter')lookupBOM()">
      <button onclick="lookupBOM()"
        style="padding:10px 24px;background:var(--tel);color:#051515;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer">
        BOM 조회
      </button>
    </div>
    <div id="bom-results"></div>
  </div>

  <!-- ④ 역전개 (Where-Used) -->
  <div id="srch-pg-where" style="display:none;padding:16px 20px">
    <div style="display:flex;gap:8px;margin-bottom:6px">
      <input id="where-pn" placeholder="품번 입력 (예: 160009300)"
        style="flex:1;padding:10px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;font-family:var(--mono)"
        onkeydown="if(event.key==='Enter')lookupWhere()">
      <button onclick="lookupWhere()"
        style="padding:10px 24px;background:var(--tel);color:#051515;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer">
        역전개 조회
      </button>
    </div>
    <div style="font-size:11.5px;color:var(--text3);margin-bottom:14px">
      이 부품이 어느 ASSY에 몇 개 사용되는지 전체 조회합니다
    </div>
    <div id="where-results"></div>
  </div>

</div>
